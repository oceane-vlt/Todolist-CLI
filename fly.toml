# Fly.io configuration TEMPLATE for self-hosting the TodoList gRPC server.
#
# This is a generic template — it does NOT reference any specific deployment.
# `app` below is a placeholder; use YOUR OWN unique app name. Either:
#   * run `fly launch` (it writes your app name into this file locally), or
#   * keep this file as-is and deploy with `fly deploy -a <your-app-name>`.
# Your real app name stays on your machine; do not commit it here.
#
# See https://fly.io/docs/reference/configuration/ for the full reference.
#
# Manual steps (no real secret is committed — see docs/deployment.md):
#   1. fly launch --no-deploy        # creates the app, pick a unique app name
#   2. fly secrets set DATABASE_URL=... SUPABASE_URL=... SUPABASE_JWT_SECRET=...
#   3. fly deploy
#
# TLS: Fly terminates TLS at the edge (http_service below) and forwards HTTP/2
# (h2c) to the container. The in-process server stays insecure behind the proxy
# (docs/target-architecture.md §6.2); set TLS_CERT_FILE/TLS_KEY_FILE only for
# end-to-end TLS all the way to the container.

app = 'your-todolist-server'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  # The server reads PORT and binds 0.0.0.0:$PORT (server/listenaddr.go).
  PORT = '50051'
  # Default storage backend on the host is Postgres; DATABASE_URL is a secret.
  TODO_STORAGE = 'postgres'

# gRPC is HTTP/2 over TLS. Fly terminates TLS at the edge and forwards h2c.
[http_service]
  internal_port = 50051
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  # Advertise HTTP/2 via ALPN at the edge so gRPC clients negotiate h2 over TLS.
  [http_service.tls_options]
    alpn = ['h2']

  # Forward HTTP/2 (h2c) to the container behind the edge.
  [http_service.http_options]
    h2_backend = true

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

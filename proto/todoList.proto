syntax = "proto3";

package todo;

// Phase 7 (volet B canonique) : annotations google.api.http pour générer une
// gateway REST/JSON via protoc-gen-grpc-gateway. Ce mapping REST reflète 1:1
// l'adaptateur manuel cmd/gateway (volet A) déjà opérationnel.
//
// IMPORTANT : l'import "google/api/annotations.proto" n'est PAS vendoré dans ce
// repo. Il est résolu par buf (dépendance buf.build/googleapis/googleapis,
// cf. buf.yaml) lors de la génération via `make proto` / `make proto-gateway`.
// Tant que cet import et les annotations google.api.http sont présents, la
// cible legacy `make proto-protoc` (plain protoc, go/go-grpc seulement) ÉCHOUE
// car protoc ne sait pas résoudre google/api/annotations.proto (absent du
// include path) : elle n'est PLUS un repli viable. La génération passe
// désormais OBLIGATOIREMENT par buf. Voir docs/grpc-gateway.md §4.
import "google/api/annotations.proto";

option go_package = "github.com/oceane-vlt/todolist/proto;todo";

service TodoListService {
    rpc CreateTodoList (CreateTodoListRequest) returns (CreateTodoListResponse){
        option (google.api.http) = {
            post: "/v1/lists"
            body: "*"
        };
    }
    rpc GetTodoLists (GetTodoListsRequest) returns (GetTodoListsResponse){
        option (google.api.http) = {
            get: "/v1/lists"
        };
    }
    rpc ShowTodoListItems (ShowTodoListItemsRequest) returns (ShowTodoListItemsResponse){
        option (google.api.http) = {
            get: "/v1/lists/{title}/items"
        };
    }
    rpc DeleteTodoList (DeleteTodoListRequest) returns (DeleteTodoListResponse){
        option (google.api.http) = {
            delete: "/v1/lists"
            body: "*"
        };
    }
    rpc DeleteTodoListItems (DeleteTodoListItemsRequest) returns (DeleteTodoListItemsResponse){
        option (google.api.http) = {
            delete: "/v1/lists/{title}/items"
            body: "*"
        };
    }
    rpc UpdateTodoList (UpdateTodoListRequest) returns (UpdateTodoListResponse){
        option (google.api.http) = {
            put: "/v1/lists/{title}/items"
            body: "*"
        };
    }
    rpc UpdateTodoListItem (UpdateTodoListItemRequest) returns (UpdateTodoListItemResponse){
        option (google.api.http) = {
            patch: "/v1/lists/{title}/items"
            body: "*"
        };
    }
}

message UpdateTodoListItemRequest {
    string title = 1;
    int32 item_index = 2;
    string new_title = 3;
}

message UpdateTodoListItemResponse {
}

message UpdateTodoListRequest {
    string title = 1;
    repeated Item items = 2;
}

message UpdateTodoListResponse {
}

message DeleteTodoListItemsRequest {
    string title = 1;
    repeated int32 item_indexes = 2;
}
message DeleteTodoListItemsResponse {
}

message ShowTodoListItemsRequest {
    string title = 1;
}

message ShowTodoListItemsResponse {
    repeated Item items = 1;
}
message DeleteTodoListRequest {
    repeated string title = 1;
}

message DeleteTodoListResponse {
}

message CreateTodoListRequest {
    string title = 1;
    repeated Item item = 3;
}

message Item {
    string title = 1;
    string description = 2;
    bool completed = 3;
    string dueDate = 4;
    string priority = 5;
}

message CreateTodoListResponse {
}

message GetTodoListsRequest {
}

message GetTodoListsResponse {
    repeated ListSize lists = 1;
}

message ListSize {
    string title = 1;
    int32 size = 2;
}

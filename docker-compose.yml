# Local Postgres for Phase 1 development and integration/parity tests.
# Matches the default PG_URL in the Makefile:
#   postgres://todo:todo@localhost:5432/todo?sslmode=disable
#
# Usage:
#   make db-up      # start Postgres
#   make migrate    # apply migrations/*.sql
#   make test-pg    # run storage tests against Postgres
#   make db-down    # stop and remove
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5
